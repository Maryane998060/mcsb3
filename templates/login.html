<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MCS B3 · Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="{{ url_for('serve_template_css', filename='base.css') }}" />
  <style>
    body { background: linear-gradient(135deg, #0f2044 0%, #1a1f5e 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-box { background: var(--bg-card); border-radius: 1rem; padding: 2.5rem; width: 100%; max-width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,.35); }
    .login-logo { text-align: center; margin-bottom: 2rem; }
    .login-logo svg { filter: drop-shadow(0 4px 12px rgba(124,58,237,.3)); }
    .login-logo h1 { font-size: 1.6rem; font-weight: 800; margin-top: .75rem; background: linear-gradient(90deg, #4f7ef8, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .login-logo p { color: var(--text-muted); font-size: .82rem; margin: 0; }
    .form-control { border-radius: .6rem; }
    .btn-login { background: linear-gradient(135deg, #1746a2, #2563a8); color: #fff; border: none; border-radius: .6rem; width: 100%; padding: .8rem; font-weight: 700; font-size: .95rem; transition: opacity .2s; }
    .btn-login:hover { opacity: .9; color: #fff; }
    .alert { border-radius: .6rem; font-size: .83rem; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-logo">
      <svg width="64" height="64" viewBox="0 0 40 40" fill="none">
        <defs>
          <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#4f7ef8"/>
            <stop offset="100%" stop-color="#7c3aed"/>
          </linearGradient>
        </defs>
        <rect width="40" height="40" rx="10" fill="url(#lg)"/>
        <rect x="7" y="25" width="6" height="10" rx="1.5" fill="white" opacity="0.55"/>
        <rect x="17" y="17" width="6" height="18" rx="1.5" fill="white" opacity="0.75"/>
        <rect x="27" y="10" width="6" height="25" rx="1.5" fill="white"/>
      </svg>
      <h1>MCS B3</h1>
      <p>Auxiliar de Renda Variável</p>
    </div>

    {% if error %}
    <div class="alert alert-danger py-2">
      <i class="bi bi-exclamation-triangle me-1"></i>{{ error }}
    </div>
    {% endif %}

    <form method="POST" action="{{ url_for('login') }}">
      <input type="hidden" name="next" value="{{ next_url }}">

      <div class="mb-3">
        <label class="form-label small fw-semibold">Usuário</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" class="form-control" name="username" placeholder="seu.usuario"
                 autofocus autocomplete="username" required />
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label small fw-semibold">Senha</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" class="form-control" name="password"
                 placeholder="••••••••" autocomplete="current-password" required />
          <button type="button" class="btn btn-outline-secondary" id="togglePwd" tabindex="-1">
            <i class="bi bi-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-login">
        <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
      </button>
    </form>
  </div>

  <script>
    document.getElementById('togglePwd').addEventListener('click', function() {
      const pwd = document.querySelector('input[name="password"]');
      const ico = document.getElementById('eyeIcon');
      if (pwd.type === 'password') {
        pwd.type = 'text';
        ico.className = 'bi bi-eye-slash';
      } else {
        pwd.type = 'password';
        ico.className = 'bi bi-eye';
      }
    });
  </script>
</body>
</html>
