<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}IRPF Renda Variável B3{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="{{ url_for('serve_template_css', filename='base.css') }}" />
  {% block page_css %}{% endblock %}
</head>
<body>

<nav class="navbar navbar-expand-lg shadow-sm mb-4 no-print" style="background-color: var(--brand);">
  <div class="container">
    <a class="navbar-brand text-white fw-bold" href="{{ url_for('upload') }}">
      <i class="bi bi-bar-chart-fill me-2"></i>IRPF B3
      <span class="badge bg-warning text-dark ms-2">Renda Variável</span>
    </a>
    <div class="d-flex align-items-center gap-2">
      {% block nav_extra %}{% endblock %}
      <button id="theme-toggle" class="btn btn-sm btn-outline-light" title="Alternar tema">
        <i class="bi bi-moon-fill" id="theme-icon"></i>
      </button>
    </div>
  </div>
</nav>

<div class="container pb-5">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // ── Tema claro/escuro ────────────────────────────────────────────────────────
  const html      = document.documentElement;
  const btn       = document.getElementById('theme-toggle');
  const icon      = document.getElementById('theme-icon');
  const savedTheme = localStorage.getItem('theme') || 'light';
  html.setAttribute('data-bs-theme', savedTheme);
  icon.className = savedTheme === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-fill';

  btn.addEventListener('click', () => {
    const next = html.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-bs-theme', next);
    icon.className = next === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
    localStorage.setItem('theme', next);
  });

  // ── Drag & drop para drop-zones ──────────────────────────────────────────────
  document.querySelectorAll('.drop-zone').forEach(zone => {
    const input = zone.querySelector('input[type=file]');
    if (!input) return;

    zone.addEventListener('click', () => input.click());
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
    zone.addEventListener('dragleave',  () => zone.classList.remove('dragover'));
    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.classList.remove('dragover');
      if (e.dataTransfer.files.length) {
        input.files = e.dataTransfer.files;
        updateZoneLabel(zone, e.dataTransfer.files[0].name);
      }
    });
    input.addEventListener('change', () => {
      if (input.files.length) updateZoneLabel(zone, input.files[0].name);
    });
  });

  function updateZoneLabel(zone, filename) {
    zone.classList.add('has-file');
    const label = zone.querySelector('.drop-label');
    if (label) {
      label.innerHTML = `<i class="bi bi-check-circle-fill text-success me-1"></i>${filename}`;
    }
  }
</script>
{% block scripts %}{% endblock %}
</body>
</html>
